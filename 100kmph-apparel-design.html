<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project — Sanbarto Mondal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --line: rgba(255,255,255,0.10);
    --ink: #f4f2ee;
    --mut: rgba(244,242,238,0.55);
    --mono: "DM Mono", ui-monospace, monospace;
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans: "Montserrat", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ---- top bar ---- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px clamp(16px, 4vw, 48px);
    background: linear-gradient(180deg, rgba(10,10,10,0.96) 60%, rgba(10,10,10,0));
    backdrop-filter: blur(6px);
  }
  .leftgrp { display: flex; align-items: center; gap: 18px; }
  .logo { display: inline-flex; color: var(--ink); text-decoration: none; }
  .logo svg { height: 20px; width: auto; display: block; }
  .logo svg path { fill: currentColor; }
  .logo:hover { opacity: 0.75; }
  .pill {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, border-color .2s;
  }
  .pill:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
  .pill svg { width: 14px; height: 14px; opacity: 0.8; }
  /* ---- floating back-to-top ---- */
  .totop {
    position: fixed;
    right: clamp(16px, 3vw, 40px);
    bottom: clamp(16px, 3vw, 40px);
    z-index: 50;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(20,20,20,0.72);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 12px 20px;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(14px);
    pointer-events: none;
    transition: opacity .28s ease, transform .28s ease, background .2s, border-color .2s;
  }
  .totop.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .totop:hover { background: rgba(36,36,36,0.85); border-color: rgba(255,255,255,0.28); }
  .totop svg { width: 13px; height: 13px; opacity: 0.85; }
  .close {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    color: var(--ink);
    font-size: 22px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; text-decoration: none;
    transition: background .2s, transform .2s;
    flex: none;
  }
  .close:hover { background: rgba(255,255,255,0.12); transform: rotate(90deg); }

  /* ---- project header ---- */
  .phead {
    padding: clamp(28px, 6vw, 70px) clamp(16px, 4vw, 48px) clamp(22px, 4vw, 40px);
    max-width: 1280px;
    margin: 0 auto;
  }
  .cat {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--mut);
    margin-bottom: 18px;
  }
  .titlerow {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px;
  }
  @media (min-width: 820px) {
    .titlerow, .desc { padding-right: 86px; }
  }
  h1 {
    font-family: var(--sans);
    font-weight: 500;
    font-size: clamp(24px, 3.6vw, 42px);
    line-height: 1.06;
    letter-spacing: -0.01em;
  }
  .date {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--mut);
    white-space: nowrap;
    padding-bottom: 8px;
  }
  .desc {
    max-width: 720px;
    margin-top: 24px;
    font-size: clamp(15px, 1.5vw, 18px);
    font-weight: 300;
    line-height: 1.65;
    color: rgba(244,242,238,0.78);
    text-wrap: pretty;
  }

  /* ---- floating action rail (removed) ---- */
  .rail-removed {
    position: fixed;
    right: clamp(10px, 2vw, 26px);
    top: 50%;
    transform: translateY(-50%);
    z-index: 40;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .rail button {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(4px);
    color: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .rail button:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .rail button svg { width: 17px; height: 17px; }
  .rail button span { font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em; }
  .rail button.active svg { fill: #ff4d4d; stroke: #ff4d4d; }
  @media (max-width: 820px) { .rail { display: none; } }

  /* ---- body / parts ---- */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 8px clamp(16px, 4vw, 48px) 40px;
  }
  .media {
    width: 100%;
    overflow: hidden;
    background: #050505;
    margin: 0;
    display: block;
  }
  .media img {
    display: block;
    width: 100%;
    height: auto;
    margin-bottom: -1px;
  }
  .media.embed { background: #000; }
  .media.embed iframe { width: 100%; height: 100%; display: block; border: 0; }
  .media.embed.flipbook {
    background: transparent;
    margin: 24px auto;
  }

  /* ---- footer / prev-next ---- */
  .pfoot {
    border-top: 1px solid var(--line);
    max-width: 1280px;
    margin: 0 auto;
    padding: clamp(28px, 5vw, 56px) clamp(16px, 4vw, 48px) clamp(60px, 10vw, 110px);
    display: flex;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .navlink { text-decoration: none; color: var(--ink); max-width: 48%; }
  .navlink.next { text-align: right; margin-left: auto; }
  .navlink .lbl {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--mut);
    display: block;
    margin-bottom: 10px;
  }
  .navlink .nm {
    font-family: var(--sans);
    font-weight: 500;
    font-size: clamp(20px, 2.6vw, 30px);
    line-height: 1.1;
    transition: color .2s;
  }
  .navlink:hover .nm { color: #c9a86a; }
  .backall {
    text-align: center;
    padding-bottom: 70px;
  }
  .backall a {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mut);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 3px;
    transition: color .2s, border-color .2s;
  }
  .backall a:hover { color: var(--ink); border-color: var(--ink); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="leftgrp">
      <a class="logo" href="/" aria-label="Sanbarto Mondal — home"><svg viewBox="0 0 257 121" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true"><path d="M104.604 92.748C110.396 92.7482 115.903 95.2593 119.701 99.6309L138.269 121H0L18.5674 99.6309C22.3659 95.2591 27.8736 92.748 33.665 92.748H104.604ZM161.922 27.2217C165.083 30.8604 166.824 35.5185 166.824 40.3389V121H138.269V76.1855H41.5811C17.0333 76.1855 7.01368 51.786 7.01367 37.3457C7.01367 22.9054 17.0333 0 41.5811 0H138.269L161.922 27.2217ZM207.01 27.2217C210.171 30.8604 211.912 35.5186 211.912 40.3389V121H183.356V0L207.01 27.2217ZM252.097 27.2217C255.258 30.8604 257 35.5185 257 40.3389V121H228.444V0L252.097 27.2217ZM119.586 21.501C115.787 25.8727 110.28 28.3828 104.488 28.3828H41.5791C37.5713 28.3828 35.0664 33.8603 35.0664 38.3418C35.0665 42.8232 37.5714 47.3047 41.5791 47.3047H138.268V0L119.586 21.501Z"></path></svg></a>
    </div>
    <a class="close" href="/" aria-label="Back to home">&times;</a>
  </div>

  <header class="phead">
    <div class="cat" id="catEl"></div>
    <div class="titlerow">
      <h1 id="titleEl"></h1>
    </div>
  </header>

  <main id="bodyEl"></main>

  <nav class="pfoot">
    <a class="navlink prev" id="prevEl"><span class="lbl">← Previous</span><span class="nm"></span></a>
    <a class="navlink next" id="nextEl"><span class="lbl">Next →</span><span class="nm"></span></a>
  </nav>
  <div class="backall"><a href="/#work">All projects</a></div>

  <button class="totop" id="toTop" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
    Back to top
  </button>

<script>
  const projects = {
    1: { title: "CheQ — Illustration Library", cat: "Illustration Set", date: "’25 · 2025",
         cover: "uploads/cheq.png",
         parts: ["uploads/chq-4.jpg","uploads/cheq-chip-animation.gif","uploads/chq-2.jpg","uploads/chq-1.jpg","uploads/chq-3.jpg"],
         desc: "A comprehensive illustration library and visual system for CheQ, a fintech credit-management app — from the chip motif and credit-card compositions to a full in-app illustration set, color usage rules and a motion-ready style guide." },
    2: { title: "Aurva — Brand Identity", cat: "Graphic Design", date: "’25 · 2026",
         cover: "uploads/aurv.png",
         parts: ["uploads/arv-1.jpg","uploads/arv-2.jpg","uploads/arv-3.jpg","uploads/arv-4.jpg","uploads/aurva-blog.gif","uploads/arv-5.jpg","uploads/arv-6.jpg"],
         desc: "Brand identity for Aurva, a data-security company — a space-themed visual language with a custom mascot, color system, typographic stylesheet and graphic elements that balance enterprise credibility with character across every touchpoint." },
    3: { title: "Graphic Design Compilation", cat: "Graphics", date: "’22 · 2025",
         cover: "uploads/GC.png",
         parts: ["uploads/gc-opening.gif","uploads/gc-1.jpg","uploads/gc-2.jpg","uploads/gc-3.jpg","uploads/gc-4.jpg","uploads/gc-5.jpg","uploads/gc-6.jpg","uploads/gc-7.jpg","uploads/gc-8.jpg","uploads/gc-9.jpg","uploads/gc-10.jpg"],
         desc: "A multi-year compilation of graphic-design coursework — typography and poster series, an album-cover redesign, book covers, a storybook, comic spreads and event branding across nine segments." },
    4: { title: "100kmph — Apparel Design", cat: "Fashion Graphics", date: "’24 · 2024",
         cover: "uploads/100kmph.png",
         parts: ["uploads/kmph-1.jpg","uploads/kmph-2.jpg","uploads/kmph-3.jpg","uploads/kmph-4.jpg"],
         desc: "Apparel and merchandise design for 100kmph, an automobile-culture brand — the OMEGA series of motorcycle-inspired graphic tees, keychains, posters and event collateral built from research and sketch to final mockup." },
    5: { title: "Decathlon — Sticker Design", cat: "Graphic Design Task", date: "’25 · 2025",
         cover: "uploads/dec.png",
         parts: ["uploads/dec-1.jpg","uploads/dec-2.jpg","uploads/dec-3.jpg","uploads/dec-4.jpg","uploads/dec-5.jpg"],
         desc: "A three-day design challenge creating graphic stickers for Decathlon cricket bats — desk research, competitive analysis, a turquoise-and-lime palette and high-fidelity bat designs around a ‘Performance Amplified’ theme." },
    6: { title: "Cadence — Dance Club Identity", cat: "Branding", date: "’25 · 2025",
         cover: "uploads/cdnc.png",
         parts: ["uploads/cdnc-1.jpg","uploads/cdnc-g1.gif","uploads/cdnc-2.jpg","uploads/cdnc-g2.gif","uploads/cdnc-3.jpg","uploads/cdnc-g3.gif","uploads/cdnc-4.jpg","uploads/cdnc-g4.gif","uploads/cdnc-5.jpg","uploads/cdnc-g5.gif","uploads/cdnc-6.jpg","uploads/cdnc-g6.gif","uploads/cdnc-7.jpg","uploads/cdnc-g7.gif"],
         desc: "Brand identity for Cadence, a college dance club — a street-art and hip-hop inspired system with graffiti logotypes, a yellow-and-greyscale palette, posters, social graphics and merchandise." },
    7: { title: "Dusk — Comic Book Design", cat: "Illustration", date: "’24 · 2024",
         cover: "uploads/dusk.png",
         parts: ["uploads/dusk-1.jpg","uploads/dusk-2.jpg","uploads/dusk-3.jpg","uploads/dusk-4.jpg",{ type: "flipbook", url: "https://heyzine.com/flip-book/eb841b0911.html", ratio: "330 / 400", maxWidth: "560px" },"uploads/dusk-5.jpg",{ type: "vimeo", url: "https://player.vimeo.com/video/943046874?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" },"uploads/dusk-6.jpg"],
         desc: "An illustrated comic-book adaptation of the short film ‘Dusk’ — a black-and-white thriller built through mood-boarding, character design and storyboarding, exploring non-linear narrative, exaggerated expression and dramatic ink work." },
    8: { title: "Doclove — App Design", cat: "UX/UI", date: "’24 · 2024",
         cover: "uploads/DOC.png",
         parts: [
           "uploads/doclove-1.jpg",
           "uploads/doclove-2.jpg",
           "uploads/doclove-3.jpg",
           "uploads/doclove-4.jpg",
           "uploads/doclove-5.jpg",
           "uploads/doclove-6.jpg",
           { type: "figma", url: "https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2FVToModcMYC9JXgJGOfoGmf%2FDocLove%3Fpage-id%3D947%253A8578%26type%3Ddesign%26node-id%3D947-8595%26viewport%3D-1055%252C-5%252C0.46%26t%3DGhy1URVveOQQCpJw-1%26scaling%3Dscale-down%26starting-point-node-id%3D947%253A13933%26mode%3Ddesign", ratio: "800 / 450" },
           "uploads/doclove-8.jpg",
           "uploads/doclove-9.jpg",
           "uploads/doclove-10.jpg"
         ],
         desc: "An app concept that helps busy middle-age people care for their ageing parents — booking OPD appointments, consulting doctors online or offline, and scheduling lab tests from home. A six-week end-to-end UX project running the full Double Diamond: research, personas, information architecture, a warm visual language and high-fidelity, connected screens." }
  };

  const order = [1,2,3,4,5,6,7,8];
  const FILES = {"1":"/cheq-illustration-library","2":"/aurva-brand-identity","3":"/graphic-design-compilation","4":"/100kmph-apparel-design","5":"/decathlon-sticker-design","6":"/cadence-dance-club-identity","7":"/dusk-comic-book-design","8":"/doclove-app-design"};

  function getId() {
    return 4;
  }

  const id = getId();
  const P = projects[id];

  document.title = P.title + " — Sanbarto Mondal";
  document.getElementById("catEl").textContent = P.cat;
  document.getElementById("titleEl").textContent = P.title;

  const bodyEl = document.getElementById("bodyEl");

  function buildPart(item, index) {
    const el = document.createElement("div");
    if (item && typeof item === "object" && (item.type === "figma" || item.type === "vimeo" || item.type === "flipbook")) {
      el.className = "media embed " + item.type;
      el.style.aspectRatio = item.ratio || "16 / 9";
      if (item.maxWidth) el.style.maxWidth = item.maxWidth;
      const frame = document.createElement("iframe");
      frame.src = item.url;
      frame.loading = "lazy";
      frame.title = P.title + " — prototype";
      frame.setAttribute("frameborder", "0");
      frame.setAttribute("allowfullscreen", "true");
      frame.allow = "autoplay; fullscreen; picture-in-picture; clipboard-write";
      frame.setAttribute("sandbox", "allow-same-origin allow-scripts allow-pointer-lock allow-forms allow-popups allow-popups-to-escape-sandbox");
      el.appendChild(frame);
      return el;
    }
    el.className = "media";
    const img = document.createElement("img");
    const eager = index === 0;
    img.src = item;
    img.alt = P.title + " — panel " + (index + 1);
    img.loading = eager ? "eager" : "lazy";
    if (eager) img.fetchPriority = "high";
    img.decoding = "async";
    el.appendChild(img);
    return el;
  }

  P.parts.forEach(function (item, i) { bodyEl.appendChild(buildPart(item, i)); });

  // prev / next
  const pos = order.indexOf(id);
  const prevId = order[(pos - 1 + order.length) % order.length];
  const nextId = order[(pos + 1) % order.length];
  const prevEl = document.getElementById("prevEl");
  const nextEl = document.getElementById("nextEl");
  prevEl.href = FILES[prevId];
  prevEl.querySelector(".nm").textContent = projects[prevId].title;
  nextEl.href = FILES[nextId];
  nextEl.querySelector(".nm").textContent = projects[nextId].title;

  // chrome interactions
  function toggle(btn) { btn.classList.toggle("active"); }

  // back-to-top
  (function () {
    const btn = document.getElementById("toTop");
    function onScroll() {
      btn.classList.toggle("show", window.scrollY > 600);
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    btn.addEventListener("click", function () {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  })();

</script>
  <script src="/site.js" defer></script>
</body>
</html>
